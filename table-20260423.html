<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>foodway 表格測試 gittest</title>
    <link rel="stylesheet" href="style0423.css">
</head>

<body>
    <main>
        <header>
            <h1>foodway 美食推薦網站</h1>
            <p>介紹一下這個網站：<br>
                這是一個記錄日常生活中各種美食的網站，<br>
                整理我吃過、喜歡、會再回訪的店家，<br>
                包含早餐、正餐與甜點飲料，<br>
                希望讓大家可以快速找到值得嘗試的好味道。</p>
        </header>



        <div class="content">
            <form>
                <p><b>*為必填項目</b></p>
                <table border="2">
                    <tr>
                        <th>*店名：</th>
                        <td><input type="text" name="name" autofocus></td>
                    </tr>
                    <tr>
                        <th>照片：</th>
                        <td></td>
                    </tr>
                    <tr>
                        <th>*推薦餐點：</th>
                        <td>
                            <select name="food" id="" size="1">
                                <option value=""></option>
                        </td>
                    </tr>
                    <tr>
                        <th>價格：</th>
                        <td></td>
                    </tr>
                    <tr>
                        <th>心得：</th>
                        <td><input type="text"></td>
                    </tr>
                </table>

                <table border="2">
                    <tr>
                        <th>*我是誰?</th>
                        <td><input type="text"></td>
                    </tr>
                    <tr>
                        <th>*E-MAIL：</th>
                        <td><input type="email"></td>
                    </tr>
                    <tr>
                        <th>留言交流：</th>
                        <td><textarea></textarea></td>

                    </tr>

                </table>

        </div>
        <div class="btns">
            <input type="submit" value="送出">
            <input type="reset" value="清除重填">
        </div>

        </form>
        <footer>
            <p>
                <small>Copyright © HUS's Web All Rights Reserved.</small>
            </p>

        </footer>
    </main>
</body>

</html>
